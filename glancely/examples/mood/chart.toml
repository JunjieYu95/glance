# Mood component — heatmap of mood scores over time
[chart]
type = "heatmap"
title = "Mood Heatmap"

[chart.data]
source = "rows"
date_field = "created_at"
value_field = "mood_score"
label_field = "mood_label"

[chart.options]
color_scheme = "green"

[overview]
enabled = true
card_type = "sparkline"
label = "Mood (7d)"
data_key = "summary.avg_score_7d"
suffix = "/10"
value_field = "mood_score"
width = 120
height = 30
color = "#4a7"
