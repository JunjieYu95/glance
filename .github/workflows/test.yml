name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Opt in to Node.js 24 ahead of GitHub's June 2026 forced switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check glance/
      - name: CLI smoke
        run: |
          glance version
          glance list
      - name: Validate SKILL.md files
        run: |
          test -f SKILL.md
          test -f glance/examples/mood/SKILL.md
          test -f glance/examples/reminder/SKILL.md
          test -f glance/examples/mit/SKILL.md
          test -f glance/examples/diary_logger/SKILL.md
          test -f glance/skills/scaffold_component/SKILL.md
      - name: Tests
        run: pytest tests/ glance/ -v
      - name: Demo + dashboard build
        env:
          GLANCE_HOME: ${{ github.workspace }}/demo_tmp
        run: |
          mkdir -p "$GLANCE_HOME"
          python glance/examples/demo-data/seed.py
          glance dashboard build --out /tmp/index.html
          test -s /tmp/index.html
