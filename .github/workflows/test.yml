name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check glance/
      - name: CLI smoke
        run: |
          glance version
          glance list
      - name: Tests
        run: pytest glance/ -v
      - name: Demo + dashboard build
        env:
          GLANCE_HOME: ${{ github.workspace }}/examples/demo-data
        run: |
          mkdir -p "$GLANCE_HOME"
          python examples/demo-data/seed.py
          glance dashboard build --out /tmp/index.html
          test -s /tmp/index.html
